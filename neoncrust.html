<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON CRUST - Premium Pizza</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --neon: #00ff9d; --dark: #0a0a14; }
    body { font-family: 'Poppins', sans-serif; background: var(--dark); color: #fff; }
    .navbar { background: rgba(10,10,20,0.95); backdrop-filter: blur(10px); }
    .neon-text { text-shadow: 0 0 25px var(--neon); color: var(--neon); }
    .hero {
      background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.pexels.com/photos/6068717/pexels-photo-6068717.jpeg');
      background-size: cover; height: 100vh; display: flex; align-items: center;
    }
    .pizza-card {
      background: #1a1a2e; border: 1px solid #00ff9d33; transition: all 0.4s;
    }
    .pizza-card:hover {
      transform: translateY(-15px);
      box-shadow: 0 0 40px rgba(0, 255, 157, 0.4);
      border-color: var(--neon);
    }
    .price { color: var(--neon); font-size: 1.6rem; font-weight: bold; }
    .btn-neon {
      background: transparent; border: 2px solid var(--neon); color: var(--neon); font-weight: bold;
    }
    .btn-neon:hover {
      background: var(--neon); color: black; box-shadow: 0 0 30px var(--neon);
    }
    .card-img-top { height: 240px; object-fit: cover; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold fs-3 neon-text" href="#">🍕 NEON CRUST</a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#menu">Menu</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Cart (<span id="cart-count">0</span>)</a></li>
      </ul>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero text-center">
    <div class="container">
      <h1 class="display-1 fw-bold neon-text">NEON CRUST</h1>
      <p class="lead fs-2 mb-4">Next-Gen Pizzas • Fresh Dough • Electric Flavors</p>
      <a href="#menu" class="btn btn-neon btn-lg px-5 py-3">Order Now</a>
    </div>
  </section>

  <!-- Menu Section -->
  <section id="menu" class="py-5">
    <div class="container">
      <h2 class="display-5 fw-bold text-center mb-4 neon-text">50+ Signature Pizzas</h2>
      <input type="text" id="search" class="form-control w-75 mx-auto mb-5 bg-dark text-white border-0" placeholder="Search any pizza...">

      <div class="row g-4" id="pizza-grid"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-black py-5 text-center">
    <div class="container">
      <p class="fs-4">📍 609/7 Sambhav Colony, Mandi Pahari</p>
      <p class="mb-1">🚀 Freshly Baked | Lightning Fast Delivery</p>
      <p>© 2026 NEON CRUST • Made for Pizza Addicts</p>
    </div>
  </footer>

  <script>
    const pizzas = [
      {id:1, name:"Margherita Glow", price:299, img:"https://images.pexels.com/photos/6068717/pexels-photo-6068717.jpeg"},
      {id:2, name:"Neon Veggie Supreme", price:449, img:"https://images.pexels.com/photos/9993754/pexels-photo-9993754.jpeg"},
      {id:3, name:"Fiery Paneer Tikka", price:399, img:"https://images.pexels.com/photos/31596394/pexels-photo-31596394.jpeg"},
      {id:4, name:"Classic Pepperoni", price:449, img:"https://images.pexels.com/photos/1437267/pexels-photo-1437267.jpeg"},
      {id:5, name:"Chicken Tikka Blast", price:499, img:"https://images.pexels.com/photos/2274326/pexels-photo-2274326.jpeg"},
      {id:6, name:"BBQ Chicken Rage", price:529, img:"https://images.pexels.com/photos/1063438/pexels-photo-1063438.jpeg"},
      {id:7, name:"Double Cheese Explosion", price:399, img:"https://images.pexels.com/photos/1639564/pexels-photo-1639564.jpeg"},
      {id:8, name:"Truffle Mushroom", price:499, img:"https://images.pexels.com/photos/291528/pexels-photo-291528.jpeg"},
      {id:9, name:"Peri Peri Chicken", price:479, img:"https://images.pexels.com/photos/1279330/pexels-photo-1279330.jpeg"},
      {id:10, name:"Butter Chicken Bonanza", price:499, img:"https://images.pexels.com/photos/1437267/pexels-photo-1437267.jpeg"},
      {id:11, name:"Hawaiian Heat", price:429, img:"https://images.pexels.com/photos/6068717/pexels-photo-6068717.jpeg"},
      {id:12, name:"Mexican Wave", price:459, img:"https://images.pexels.com/photos/9993754/pexels-photo-9993754.jpeg"},
      {id:13, name:"Tandoori Paneer Special", price:419, img:"https://images.pexels.com/photos/31596394/pexels-photo-31596394.jpeg"},
      {id:14, name:"Smoky Sausage Feast", price:549, img:"https://images.pexels.com/photos/2274326/pexels-photo-2274326.jpeg"},
      {id:15, name:"Spicy Jalapeño", price:489, img:"https://images.pexels.com/photos/1063438/pexels-photo-1063438.jpeg"},
      {id:16, name:"Loaded Veggie Paradise", price:439, img:"https://images.pexels.com/photos/1639564/pexels-photo-1639564.jpeg"},
      {id:17, name:"Garlic Bread Crust", price:379, img:"https://images.pexels.com/photos/291528/pexels-photo-291528.jpeg"},
      {id:18, name:"Mutton Keema Bomb", price:579, img:"https://images.pexels.com/photos/1279330/pexels-photo-1279330.jpeg"},
      {id:19, name:"Corn Cheese Blast", price:359, img:"https://images.pexels.com/photos/6068717/pexels-photo-6068717.jpeg"},
      {id:20, name:"Supreme Overload", price:599, img:"https://images.pexels.com/photos/9993754/pexels-photo-9993754.jpeg"}
    ];

    // Extra 30 pizzas
    const extraNames = ["Farmhouse Fresh", "Italian Stallion", "Chilli Paneer Fire", "Chicken Sausage", "Pesto Basil", "Nachos Crunch", "Tandoori Chicken", "Extra Cheese Margherita", "BBQ Paneer", "Seafood Sensation", "Spicy Veg Delight", "Meat Lovers", "White Garlic Pizza"];
    for(let i = 21; i <= 50; i++) {
      pizzas.push({
        id: i,
        name: extraNames[(i-21) % extraNames.length] + (i % 3 === 0 ? " Deluxe" : ""),
        price: 350 + Math.floor(Math.random() * 280),
        img: pizzas[(i-1) % 20].img
      });
    }

    let cart = [];

    function renderPizzas(filtered) {
      const grid = document.getElementById('pizza-grid');
      grid.innerHTML = '';
      filtered.forEach(p => {
        grid.innerHTML += `
          <div class="col-md-4 col-lg-3">
            <div class="card pizza-card h-100 text-white">
              <img src="${p.img}" class="card-img-top" alt="${p.name}">
              <div class="card-body d-flex flex-column">
                <h5>${p.name}</h5>
                <p class="price">₹${p.price}</p>
                <button class="btn btn-neon mt-auto" onclick="addToCart(${p.id})">
                  <i class="fas fa-cart-plus"></i> Add to Cart
                </button>
              </div>
            </div>
          </div>`;
      });
    }

    function addToCart(id) {
      const pizza = pizzas.find(p => p.id === id);
      cart.push(pizza);
      document.getElementById('cart-count').textContent = cart.length;
      alert(`${pizza.name} added to cart! 🛒`);
    }

    // Search
    document.getElementById('search').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = pizzas.filter(p => p.name.toLowerCase().includes(term));
      renderPizzas(filtered);
    });

    // Load all
    renderPizzas(pizzas);
  </script>
</body>
</html>
